# hyprlang noerror false
# Put general config stuff here
# Here's a list of every variable: https://wiki.hyprland.org/Configuring/Variables/

# monitor=,addreserved, 0, 0, 0, 0 # Custom reserved area

# HDMI port: mirror display. To see device name, use `hyprctl monitors`

input {
    touchpad {
        natural_scroll = no
        tap-to-click = false
        clickfinger_behavior = true
    }
}

# Override auto-generated border colors: electric blue focus outline.
# Loads after hyprland/colors.conf so it survives wallpaper/theme changes.
general {
    border_size = 2
    col.active_border = rgba(00BFFFFF)
    col.inactive_border = rgba(1c1c1933)
}

# Steel-blue-gray titlebars (overrides matugen's near-black default).
plugin {
    hyprbars {
        bar_color = rgba(2E3B4CFF)
    }
}

